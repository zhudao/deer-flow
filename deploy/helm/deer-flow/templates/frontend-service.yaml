apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ include "deer-flow.namespace" . }}
  labels:
    {{- include "deer-flow.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: http
  selector:
    {{- include "deer-flow.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
