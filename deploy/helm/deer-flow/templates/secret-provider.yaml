{{- if and (not .Values.existingSecret) .Values.secrets -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "deer-flow.providerSecret" . }}
  namespace: {{ include "deer-flow.namespace" . }}
  labels:
    {{- include "deer-flow.labels" . | nindent 4 }}
type: Opaque
stringData:
{{- range $k, $v := .Values.secrets }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
{{- end -}}
