apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: {{ include "deer-flow.namespace" . }}
  labels:
    {{- include "deer-flow.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8001
      targetPort: http
  selector:
    {{- include "deer-flow.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
