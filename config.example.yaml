  #   when_thinking_enabled:
  #     extra_body:
  #       thinking:
  #         type: adaptive
  #   when_thinking_disabled:
  #     extra_body:
  #       thinking:
  #         type: disabled

  # NOTE: M2.x models always think — passing thinking:{type:disabled} has no
